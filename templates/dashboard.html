<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Satellite Collision Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #0a0a1a; color: #fff; }
  h1 { text-align: center; margin-top: 20px; }
  #dashboard { width: 90%; max-width: 1200px; margin: 20px auto; }
  canvas { background: rgba(0,0,0,0.7); border-radius: 10px; }
</style>
</head>
<body>
<h1>Satellite Collision Risk Dashboard</h1>
<div id="dashboard">
  <canvas id="riskChart"></canvas>
</div>

<script>
const ctx = document.getElementById('riskChart').getContext('2d');
let satelliteNames = []; // will be populated dynamically
let satelliteRisks = [];

const riskChart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: satelliteNames,
        datasets: [{
            label: 'Collision Risk %',
            data: satelliteRisks,
            backgroundColor: function(context) {
                let value = context.dataset.data[context.dataIndex];
                return value > 70 ? 'rgba(255,0,0,0.7)' : value > 30 ? 'rgba(255,255,0,0.7)' : 'rgba(0,255,0,0.7)';
            },
            borderColor: '#fff',
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true, max: 100, title: { display:true, text:'Risk %'} }
        }
    }
});

// Simulate live updates
function updateDashboard(){
    fetch("/api/satellites")
    .then(res => res.json())
    .then(data => {
        satelliteNames.length = 0;
        satelliteRisks.length = 0;
        data.forEach(sat => {
            satelliteNames.push(sat.name);
            // simulate real-time risk
            satelliteRisks.push(Math.min(100, Math.max(0, sat.risk || Math.floor(Math.random()*100))));
        });
        riskChart.update();
    });
}

// Update every 5 seconds
setInterval(updateDashboard, 5000);
updateDashboard();
</script>
</body>
</html>
