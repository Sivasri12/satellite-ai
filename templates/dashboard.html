<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Satellite Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    background-color: #0a0f2a; /* dark blue instead of black */
    color: #fff;
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
}
header {
    background-color: #1a237e;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
.container {
    padding: 20px;
}
canvas {
    background-color: #111a44; /* slightly lighter than body */
    border-radius: 10px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th, td {
    padding: 8px;
    border: 1px solid #ffffff55;
    text-align: left;
}
th {
    background-color: #3949ab;
}
tr:nth-child(even) {
    background-color: #28359355;
}
</style>
</head>
<body>
<header>Satellite Dashboard</header>
<div class="container">
    <canvas id="riskChart" width="800" height="400"></canvas>

    <table>
        <thead>
            <tr>
                <th>Satellite Name</th>
                <th>Risk Level</th>
                <th>Distance (km)</th>
            </tr>
        </thead>
        <tbody id="satTable">
            <!-- dynamic rows -->
        </tbody>
    </table>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
