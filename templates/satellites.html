<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Satellite Simulation</title>
<style>
  body { margin:0; overflow:hidden; background-color:#0a0f2a; color:#fff; font-family: Arial, sans-serif; }
  #dashboard {
    position: absolute; top: 10px; right: 10px; width: 300px; 
    background: rgba(20,30,70,0.85); padding: 15px; border-radius:10px; 
    color: #fff; font-size:14px; max-height:90vh; overflow-y:auto;
  }
  h2 { font-size:16px; margin:0 0 10px 0; }
</style>
</head>
<body>
<div id="dashboard">
  <h2>Collision Risk Dashboard</h2>
  <div id="satInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/controls/OrbitControls.js"></script>

<script>
// === Scene setup ===
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// === Earth ===
const earthGeometry = new THREE.SphereGeometry(50, 64, 64);
const earthTexture = new THREE.TextureLoader().load('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
const earthMaterial = new THREE.MeshPhongMaterial({ map: earthTexture });
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// === Light ===
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(200,200,200);
scene.add(light);
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

// === Orbit Controls ===
const controls = new THREE.OrbitControls(camera, renderer.domElement);
camera.position.z = 300;

// === Satellites ===
let satellites = [];
for(let i=0; i<50; i++){
    const satGeo = new THREE.SphereGeometry(1.5,8,8);
    const satMat = new THREE.MeshBasicMaterial({color:0xff5555});
    const sat = new THREE.Mesh(satGeo, satMat);
    const angle = Math.random()*Math.PI*2;
    const radius = 70 + Math.random()*50;
    sat.userData = {
        name: `SAT-${i+1}`,
        risk: Math.random()*100,
        distance: radius
    };
    sat.position.set(Math.cos(angle)*radius, Math.sin(angle)*radius, Math.sin(angle)*radius/2);
    scene.add(sat);
    satellites.push(sat);
}

// === Dashboard ===
function updateDashboard(){
    const satDiv = document.getElementById('satInfo');
    satDiv.innerHTML = '';
    satellites.forEach(s=>{
        let riskColor = s.userData.risk>80 ? '#ff5555' : s.userData.risk>50 ? '#ffaa00' : '#55ff55';
        satDiv.innerHTML += `<p><strong>${s.userData.name}</strong> | Risk: <span style="color:${riskColor}">${s.userData.risk.toFixed(1)}%</span> | Distance: ${s.userData.distance.toFixed(1)} km</p>`;
        if(s.userData.risk>85){
            // AI voice alert
            const msg = new SpeechSynthesisUtterance(`${s.userData.name} at high risk, adjusting orbit`);
            window.speechSynthesis.speak(msg);
            s.position.x += Math.random()*2-1; // simulate movement
            s.position.y += Math.random()*2-1;
        }
    });
}

// === Animate satellites ===
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.001;
    satellites.forEach(s=>{
        s.rotation.y += 0.01;
        s.position.x += Math.sin(Date.now()*0.001 + s.userData.distance*0.01)*0.05;
        s.position.y += Math.cos(Date.now()*0.001 + s.userData.distance*0.01)*0.05;
        s.userData.risk = Math.random()*100; // simulate dynamic risk
    });
    updateDashboard();
    controls.update();
    renderer.render(scene,camera);
}
animate();

// === Handle window resize ===
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
